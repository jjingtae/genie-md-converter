name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: npm 설치
        run: npm install

      - name: Tauri 빌드
        run: npx tauri build

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: genie-md-converter-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/genie-md-converter.exe
          retention-days: 30
