<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지니 MD 변환기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 36px 32px;
      width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      color: #333;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }

    /* 드롭존 */
    #drop-zone {
      border: 2px dashed #ccc;
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #fafbff;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #667eea;
      background: #f0f3ff;
    }

    #drop-zone .icon { font-size: 48px; margin-bottom: 10px; }
    #drop-zone .main-text { font-size: 14px; color: #555; }
    #drop-zone .sub-text { font-size: 12px; color: #aaa; margin-top: 6px; }

    .supported { font-size: 11px; color: #bbb; text-align: center; margin-top: 8px; }

    /* 파일 목록 */
    #file-list {
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #f8f9fc;
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .file-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #333;
    }

    .file-item .status {
      font-size: 12px;
      margin-left: 10px;
      white-space: nowrap;
    }

    .file-item .status.waiting { color: #aaa; }
    .file-item .status.converting { color: #667eea; }
    .file-item .status.done { color: #27ae60; }
    .file-item .status.error { color: #e74c3c; }

    .file-item .remove {
      cursor: pointer;
      color: #ccc;
      margin-left: 8px;
      font-size: 16px;
      transition: color 0.2s;
    }

    .file-item .remove:hover { color: #e74c3c; }

    /* 버튼 */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-convert {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    #btn-convert:hover { opacity: 0.9; transform: translateY(-1px); }
    #btn-convert:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    #btn-reset {
      background: #f0f0f0;
      color: #666;
      flex: 0.4;
    }

    #btn-reset:hover { background: #e0e0e0; }

    /* 진행바 */
    #progress-wrap {
      margin-top: 16px;
      display: none;
    }

    #progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 10px;
      transition: width 0.3s;
    }

    #progress-text {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-top: 6px;
    }

    /* 결과 */
    #result {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      display: none;
    }

    #result .success { color: #27ae60; font-weight: bold; }
    #result .fail { color: #e74c3c; }

    /* 미리보기 */
    #preview-wrap {
      margin-top: 16px;
      display: none;
    }

    #preview-wrap h3 {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    #preview {
      background: #f8f9fc;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 16px;
      max-height: 300px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.7;
      color: #333;
      white-space: pre-wrap;
      word-break: break-all;
    }

    footer {
      text-align: center;
      font-size: 10px;
      color: #ccc;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✨ 지니 MD 변환기 ✨</h1>
  <p class="subtitle">문서를 Markdown으로 변환합니다</p>

  <div id="drop-zone">
    <div class="icon">📂</div>
    <div class="main-text">파일을 여기에 끌어다 놓으세요</div>
    <div class="sub-text">또는 클릭해서 선택</div>
  </div>
  <div class="supported">지원: PDF, DOCX, HWP, TXT</div>

  <div id="file-list"></div>

  <div class="btn-row">
    <button id="btn-convert" disabled>변환 시작</button>
    <button id="btn-reset">초기화</button>
  </div>

  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-text">준비 중...</div>
  </div>

  <div id="result"></div>

  <div id="preview-wrap">
    <h3>📄 변환 결과 미리보기</h3>
    <div id="preview"></div>
  </div>

  <footer>© JINTAE · Powered by Rust + Tauri</footer>
</div>

<script>
  // Tauri API
  const { invoke } = window.__TAURI__.tauri;
  const { open, save } = window.__TAURI__.dialog;

  const dropZone = document.getElementById('drop-zone');
  const fileListEl = document.getElementById('file-list');
  const btnConvert = document.getElementById('btn-convert');
  const btnReset = document.getElementById('btn-reset');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressText = document.getElementById('progress-text');
  const resultEl = document.getElementById('result');
  const previewWrap = document.getElementById('preview-wrap');
  const previewEl = document.getElementById('preview');

  let files = []; // {path, name, status}

  // ── 드래그&드롭 ──
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    // Tauri에서는 드롭 이벤트로 파일 경로를 직접 받을 수 없으므로
    // 파일 선택 다이얼로그 사용
    selectFiles();
  });

  dropZone.addEventListener('click', selectFiles);

  async function selectFiles() {
    try {
      const selected = await open({
        multiple: true,
        filters: [{
          name: '문서',
          extensions: ['pdf', 'docx', 'hwp', 'txt', 'md']
        }]
      });

      if (!selected) return;

      const paths = Array.isArray(selected) ? selected : [selected];
      for (const p of paths) {
        const name = p.split('\\').pop().split('/').pop();
        if (!files.find(f => f.path === p)) {
          files.push({ path: p, name, status: 'waiting' });
        }
      }
      renderFileList();
    } catch (e) {
      console.error('파일 선택 오류:', e);
    }
  }

  function renderFileList() {
    if (files.length === 0) {
      fileListEl.style.display = 'none';
      btnConvert.disabled = true;
      return;
    }

    fileListEl.style.display = 'block';
    btnConvert.disabled = false;

    fileListEl.innerHTML = files.map((f, i) => {
      const statusClass = f.status;
      const statusText = {
        waiting: '대기',
        converting: '변환 중...',
        done: '✓ 완료',
        error: '✗ 실패'
      }[f.status] || '';

      return `<div class="file-item">
        <span class="name" title="${f.path}">${f.name}</span>
        <span class="status ${statusClass}">${statusText}</span>
        <span class="remove" onclick="removeFile(${i})">×</span>
      </div>`;
    }).join('');
  }

  window.removeFile = function(idx) {
    files.splice(idx, 1);
    renderFileList();
  };

  // ── 변환 ──
  btnConvert.addEventListener('click', async () => {
    if (files.length === 0) return;

    // 단일 파일 → 미리보기, 다중 파일 → 일괄 저장
    if (files.length === 1) {
      await convertSingle();
    } else {
      await convertBatch();
    }
  });

  async function convertSingle() {
    const file = files[0];
    file.status = 'converting';
    renderFileList();

    progressWrap.style.display = 'block';
    progressBar.style.width = '50%';
    progressText.textContent = '변환 중...';
    resultEl.style.display = 'none';
    previewWrap.style.display = 'none';

    try {
      const md = await invoke('convert_file', { path: file.path });
      file.status = 'done';
      renderFileList();

      progressBar.style.width = '100%';
      progressText.textContent = '완료!';

      // 미리보기
      previewWrap.style.display = 'block';
      previewEl.textContent = md.substring(0, 3000) + (md.length > 3000 ? '\n\n... (이하 생략)' : '');

      // 저장 다이얼로그
      const stem = file.name.replace(/\.[^.]+$/, '');
      const savePath = await save({
        defaultPath: stem + '.md',
        filters: [{ name: 'Markdown', extensions: ['md'] }]
      });

      if (savePath) {
        await invoke('convert_and_save', {
          inputPath: file.path,
          outputPath: savePath
        });
        resultEl.innerHTML = '<span class="success">✓ 저장 완료!</span>';
        resultEl.style.display = 'block';
      }
    } catch (e) {
      file.status = 'error';
      renderFileList();
      progressBar.style.width = '100%';
      resultEl.innerHTML = `<span class="fail">오류: ${e}</span>`;
      resultEl.style.display = 'block';
    }
  }

  async function convertBatch() {
    // 출력 폴더 선택
    const outDir = await open({ directory: true, title: '저장할 폴더 선택' });
    if (!outDir) return;

    progressWrap.style.display = 'block';
    resultEl.style.display = 'none';
    previewWrap.style.display = 'none';

    const paths = files.map(f => f.path);

    for (let i = 0; i < files.length; i++) {
      files[i].status = 'converting';
      renderFileList();
      progressBar.style.width = `${((i + 0.5) / files.length) * 100}%`;
      progressText.textContent = `변환 중... (${i + 1}/${files.length})`;

      try {
        const stem = files[i].name.replace(/\.[^.]+$/, '');
        const outPath = outDir + '\\' + stem + '.md';
        await invoke('convert_and_save', {
          inputPath: files[i].path,
          outputPath: outPath
        });
        files[i].status = 'done';
      } catch (e) {
        files[i].status = 'error';
      }
      renderFileList();
    }

    progressBar.style.width = '100%';
    const doneCount = files.filter(f => f.status === 'done').length;
    const failCount = files.filter(f => f.status === 'error').length;
    progressText.textContent = '완료!';
    resultEl.innerHTML = `<span class="success">✓ ${doneCount}개 완료</span>` +
      (failCount > 0 ? ` <span class="fail">(${failCount}개 실패)</span>` : '');
    resultEl.style.display = 'block';
  }

  // ── 초기화 ──
  btnReset.addEventListener('click', () => {
    files = [];
    renderFileList();
    progressWrap.style.display = 'none';
    progressBar.style.width = '0%';
    resultEl.style.display = 'none';
    previewWrap.style.display = 'none';
  });
</script>
</body>
</html>
